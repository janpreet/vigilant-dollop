<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Theme initialization before CSS loads -->
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Self-hosted fonts -->
  <style>
    @font-face {
      font-family: 'Inter';
      src: url('{{ "/assets/fonts/inter-variable.woff2" | relative_url }}') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('{{ "/assets/fonts/jetbrains-mono-variable.woff2" | relative_url }}') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Fraunces';
      src: url('{{ "/assets/fonts/fraunces-variable.woff2" | relative_url }}') format('woff2');
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="shortcut icon" type="image/png" href="/favicon.png">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  {%- seo -%}
</head>
