<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="footer-inner">
    <div class="footer-left">
      <span class="p-name">
        {%- if site.author -%}{{ site.author | escape }}{%- else -%}{{ site.title | escape }}{%- endif -%}
      </span>
      {%- if site.email -%}
        <a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a>
      {%- endif -%}
      <span class="footer-license">
        © 2012-{{ site.time | date: "%Y" }} <a rel="license" href="http://creativecommons.org/licenses/by-nc-sa/4.0/"><img alt="Creative Commons License" style="border-width:0;vertical-align:middle" src="https://i.creativecommons.org/l/by-nc-sa/4.0/80x15.png" /></a>
      </span>
    </div>

    <div class="footer-right">
      {%- include social.html -%}
    </div>
  </div>

</footer>

<script>
  (function () {
    function hueIndex(name) {
      var h = 5381;
      for (var i = 0; i < name.length; i++) h = ((h << 5) + h + name.charCodeAt(i)) >>> 0;
      return h % 6;
    }
    document.querySelectorAll('.tag-chip, .tag-filter-btn[data-tag]:not([data-tag="all"])').forEach(function (el) {
      var name = (el.dataset.tag || el.textContent).trim().toLowerCase().replace(/\s*\d+$/, '');
      el.classList.add('tag-hue-' + hueIndex(name));
    });
  })();
</script>
