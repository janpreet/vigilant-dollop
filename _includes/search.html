<!-- Search overlay -->
<div id="search-overlay" class="search-overlay" aria-hidden="true" role="dialog" aria-label="Search">
  <div class="search-modal">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        id="search-input"
        type="text"
        placeholder="Search posts…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search posts"
      />
      <button id="search-close" class="search-close" aria-label="Close search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div id="search-results" class="search-results" aria-live="polite"></div>
    <p class="search-hint" id="search-hint">Type to search across all posts</p>
  </div>
</div>

<script src="https://unpkg.com/lunr@2.3.9/lunr.js" integrity="sha384-Mrc0XsDxndfJgV5jLnEeThch4j9dNEXAE1vbWeyzmERxSvF8siQfuEczzgUelQQH" crossorigin="anonymous"></script>
<script>
(function() {
  var overlay    = document.getElementById('search-overlay');
  var input      = document.getElementById('search-input');
  var results    = document.getElementById('search-results');
  var hint       = document.getElementById('search-hint');
  var closeBtn   = document.getElementById('search-close');
  var searchBtn  = document.getElementById('search-toggle');
  var idx        = null;
  var posts      = [];

  function openSearch() {
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    document.body.classList.add('search-open');
    setTimeout(function() { input.focus(); }, 50);
    if (!idx) loadIndex();
  }

  function closeSearch() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('search-open');
    input.value = '';
    results.innerHTML = '';
    hint.style.display = '';
  }

  function loadIndex() {
    fetch('{{ "/search.json" | relative_url }}')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        posts = data;
        idx = lunr(function() {
          this.ref('url');
          this.field('title', { boost: 10 });
          this.field('tags',  { boost: 5 });
          this.field('excerpt', { boost: 2 });
          this.field('content');
          data.forEach(function(p) { this.add(p); }, this);
        });
        // If user already typed, run search now
        if (input.value.trim()) doSearch(input.value.trim());
      });
  }

  function doSearch(query) {
    if (!idx || !query) {
      results.innerHTML = '';
      hint.style.display = '';
      return;
    }
    hint.style.display = 'none';
    var matches;
    try {
      matches = idx.search(query + '*');
      if (!matches.length) matches = idx.search(query);
    } catch(e) {
      matches = [];
    }
    if (!matches.length) {
      results.innerHTML = '<p class="search-no-results">No results for <strong>' + escHtml(query) + '</strong></p>';
      return;
    }
    var html = '<ul class="search-result-list">';
    matches.slice(0, 10).forEach(function(m) {
      var p = posts.find(function(x) { return x.url === m.ref; });
      if (!p) return;
      var tags = p.tags.length
        ? p.tags.map(function(t) { return '<span class="tag-chip">' + escHtml(t) + '</span>'; }).join('')
        : '';
      html += '<li class="search-result-item">'
        + '<a href="' + escHtml(p.url) + '">'
        + '<span class="search-result-title">' + escHtml(p.title) + '</span>'
        + '<span class="search-result-date">' + escHtml(p.date) + '</span>'
        + '</a>'
        + (tags ? '<div class="post-tags">' + tags + '</div>' : '')
        + (p.excerpt ? '<p class="search-result-excerpt">' + escHtml(p.excerpt) + '</p>' : '')
        + '</li>';
    });
    html += '</ul>';
    results.innerHTML = html;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  if (searchBtn) {
    searchBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      overlay.classList.contains('open') ? closeSearch() : openSearch();
    });
  }

  closeBtn.addEventListener('click', closeSearch);

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeSearch();
  });

  input.addEventListener('input', function() {
    doSearch(this.value.trim());
  });

  document.addEventListener('keydown', function(e) {
    if ((e.key === 'k' || e.key === 'K') && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      overlay.classList.contains('open') ? closeSearch() : openSearch();
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
      closeSearch();
    }
  });
})();
</script>
