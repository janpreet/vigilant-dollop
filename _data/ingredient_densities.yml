# Grams per US cup (236.588 ml), used to give recipe ingredients listed by
# weight a "~X cups" estimate when a reader switches to imperial units.
# These are averages, not lab values, actual density varies by brand and
# how packed/sifted the ingredient is, which is why the recipe UI always
# prefixes this figure with "~".
#
# Keys are matched against each ingredient's `key` field in a post's front
# matter (falls back to `item` if `key` is omitted), lowercased. Add an
# entry here once and every recipe that references it benefits.

